name: Release Executa Binary

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (ARM + x86_64)
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        platform:
          - darwin-arm64
          - darwin-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller>=6.19.0
        shell: bash

      - name: Build darwin-arm64 (native)
        if: matrix.platform == 'darwin-arm64'
        run: python scripts/package.py --platform darwin-arm64
        shell: bash

      - name: Build darwin-x86_64 (cross-compile via Rosetta)
        if: matrix.platform == 'darwin-x86_64'
        run: |
          arch -x86_64 python -m pip install pyinstaller>=6.19.0
          arch -x86_64 python scripts/package.py --platform darwin-x86_64
        shell: bash

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: dist/mini-notes-summarize-${{ matrix.platform }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller>=6.19.0
        shell: bash

      - name: Build, smoke test & package
        run: python scripts/package.py --platform linux-x86_64
        shell: bash

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: dist/mini-notes-summarize-linux-x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller>=6.19.0
        shell: bash

      - name: Build, smoke test & package
        run: python scripts/package.py --platform windows-x86_64
        shell: bash

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: dist/mini-notes-summarize-windows-x86_64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
